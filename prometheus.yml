global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      -   targets: ['10.0.0.3:9100']

  - job_name: 'postgres'
    static_configs:
      - targets: ['10.0.0.2:9187']

  - job_name: 'node-app'
    static_configs:
      - targets: ['10.0.0.4:3000']
